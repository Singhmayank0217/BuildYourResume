version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: resume_builder_db
    environment:
      POSTGRES_USER: resume_user
      POSTGRES_PASSWORD: secure_password_123
      POSTGRES_DB: resume_builder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/01_init_database.sql:/docker-entrypoint-initdb.d/01_init_database.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume_builder_api
    environment:
      DATABASE_URL: postgresql://resume_user:secure_password_123@postgres:5432/resume_builder
      SECRET_KEY: your-secret-key-change-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network
    volumes:
      - ./backend:/app

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume_builder_web
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app_network
    volumes:
      - ./frontend:/app

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
