[pytest]
minversion = 7.0
addopts = -ra --strict-markers --strict-config
python_files = test_*.py
python_classes = Test*
python_functions = test_*
testpaths = tests
norecursedirs = .git .venv venv __pycache__ build dist site-packages
pythonpath = .
asyncio_mode = auto
markers =
    unit: Fast, isolated tests for pure logic
    integration: Tests that use external services like Postgres/Redis
    e2e: End-to-end tests that validate API workflows
    migration: Alembic migration and schema integrity tests
