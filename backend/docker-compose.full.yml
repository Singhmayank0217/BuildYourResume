version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: smart
      POSTGRES_PASSWORD: smart
      POSTGRES_DB: smart_resume
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smart -d smart_resume']
      interval: 5s
      timeout: 5s
      retries: 20
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
  api:
    build: .
    environment:
      DATABASE_URL: postgresql://smart:smart@postgres:5432/smart_resume
      JWT_SECRET: change-me
      LLM_PROVIDER: local
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
  celery-worker:
    build: .
    environment:
      DATABASE_URL: postgresql://smart:smart@postgres:5432/smart_resume
      JWT_SECRET: change-me
      LLM_PROVIDER: local
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A app.celery_app.celery worker --loglevel=info
  celery-beat:
    build: .
    environment:
      DATABASE_URL: postgresql://smart:smart@postgres:5432/smart_resume
      JWT_SECRET: change-me
      LLM_PROVIDER: local
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A app.celery_app.celery beat --loglevel=info
  flower:
    image: mher/flower:2.0.1
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - '5555:5555'
    depends_on:
      redis:
        condition: service_started
volumes:
  postgres_data:
