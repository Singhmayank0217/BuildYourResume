version: '3.9'
services:
  test-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_DB: smart_resume_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U test_user -d smart_resume_test']
      interval: 5s
      timeout: 5s
      retries: 20
  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://test_user:test_pass@test-postgres:5432/smart_resume_test
      JWT_SECRET: test-secret
      LLM_PROVIDER: local
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      test-postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["pytest", "-q"]
